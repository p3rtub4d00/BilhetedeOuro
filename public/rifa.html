<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comprar Cota - Bilhete de Ouro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>
<body>

    <header class="hero-header" style="padding-bottom: 50px;">
        <div class="top-bar">
            <a href="/" class="logo-area"><i class="fa-solid fa-ticket-simple"></i> BILHETE<span class="highlight">OURO</span></a>
            <a href="/" class="btn-nav-outline"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </div>
    </header>

    <main class="container" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start;">
        
        <div class="card" style="flex: 1; min-width: 300px; max-width: 450px;">
            <p style="color: var(--primary-color); font-weight: 900; font-size: 0.8rem; letter-spacing: 1px;"><i class="fa-solid fa-star"></i> PRÊMIO PRINCIPAL</p>
            <img id="rifa-image" alt="Imagem da rifa" style="display:none; width: 100%; max-height: 260px; object-fit: cover; border-radius: 12px; margin-bottom: 12px;">
            <h2 id="rifa-title" class="card-title" style="font-size: 1.5rem; margin-top: 5px;">Carregando...</h2>
            <p id="rifa-desc" class="card-desc" style="font-size: 1rem;"></p>
            <p id="rifa-data-sorteio" class="card-desc" style="font-size: 0.9rem;"></p>
            <p id="rifa-item-desc" class="card-desc" style="font-size: 0.95rem;"></p>
            
            <div class="info-box">
                <i class="fa-solid fa-clover info-icon"></i>
                <div>
                    <strong style="color: #d97706; font-size: 0.95rem;">Loteria Federal</strong>
                    <p style="font-size: 0.85rem; color: var(--text-dark); margin-top: 5px; font-family: 'Roboto';">Comprando 1 cota, você recebe 2 números da sorte.</p>
                </div>
            </div>
            
            <h3 style="margin-top: 20px; font-size: 1.1rem; color: var(--text-dark); font-weight: 900;">QUANTAS COTAS?</h3>
            <div class="qty-selector">
                <button class="qty-btn" onclick="mudarQtd(-1)"><i class="fa-solid fa-minus"></i></button>
                <span class="qty-display" id="qtd-cotas">1</span>
                <button class="qty-btn" onclick="mudarQtd(1)"><i class="fa-solid fa-plus"></i></button>
            </div>
            <p style="color: var(--text-light); font-size: 0.95rem; font-family: 'Roboto';">Você receberá <strong id="qtd-numeros" style="color: var(--primary-dark);">2</strong> bilhetes gerados.</p>
        </div>

        <div class="card" style="flex: 1; min-width: 300px; max-width: 450px;">
            <h3 class="card-title"><i class="fa-brands fa-pix" style="color: #32BCAD;"></i> Pagamento</h3>
            <div class="price-box" style="width: 100%; font-size: 1.8rem; border-style: solid; margin-top: 10px;" id="valor-total">
                R$ 0,00
            </div>
            
            <div id="alert-box"></div>

            <form id="form-compra">
                <div class="form-group">
                    <label>Seu Nome Completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="João da Silva" required>
                </div>
                <div class="form-group">
                    <label>Seu WhatsApp</label>
                    <input type="text" id="telefone" class="form-control" placeholder="(11) 99999-9999" required>
                </div>
                
                <button type="submit" class="btn-primary" id="btn-finalizar" style="margin-top: 20px;"><i class="fa-solid fa-qrcode"></i> GERAR PIX</button>
            </form>
            
            <div id="sucesso-panel" style="display: none;">
                <h3 style="color: var(--primary-dark); font-weight: 900; font-size: 1.5rem;"><i class="fa-solid fa-circle-check"></i> SUCESSO!</h3>
                <p style="color: var(--text-light); font-family: 'Roboto'; margin-top: 10px;">Aqui estão os seus números da sorte:</p>
                <div class="meus-numeros-box" id="numeros-gerados"></div>
                <div id="comprovante-info" style="margin-top: 10px; text-align: left;"></div>
                <button id="btn-comprovante" class="btn-primary" style="display:none; margin-top: 12px;"><i class="fa-solid fa-file-pdf"></i> BAIXAR COMPROVANTE PDF</button>
                <a href="/compras.html" class="btn-primary" style="margin-top: 20px; background: #1e293b; color: white;"><i class="fa-solid fa-list"></i> VER HISTÓRICO</a>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
    <script src="/js/rifa.js"></script>
</body>
</html>
