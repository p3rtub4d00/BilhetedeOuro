<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minhas Compras - Bilhete de Ouro</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>🎫 Bilhete de Ouro</h1>
        <nav><a href="/">Início</a></nav>
    </header>

    <main class="container">
        <h2 class="title">Buscar Meus Números</h2>
        <div style="max-width: 400px; margin: 0 auto 2rem; text-align: center;">
            <input type="text" id="tel-busca" class="form-control" placeholder="Digite seu WhatsApp">
            <button onclick="buscarCompras()" class="btn" style="margin-top: 10px;">Buscar</button>
        </div>

        <div id="resultado-busca" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </main>

    <script src="/js/main.js"></script>
    <script>
        async function buscarCompras() {
            const tel = document.getElementById('tel-busca').value;
            if(!tel) return alert('Digite o telefone');

            try {
                const compras = await fetchAPI(`/api/minhas-compras/${tel}`);
                let html = '';
                if(compras.length === 0) html = '<p style="text-align:center;">Nenhuma compra encontrada.</p>';
                
                compras.forEach(c => {
                    // Formata os números em tags visuais
                    const tagsHTML = c.numeros.map(n => `<span class="num-tag">${n}</span>`).join('');

                    html += `
                        <div class="card" style="text-align: left;">
                            <h3 style="color: var(--primary)">${c.rifaId.titulo}</h3>
                            <p><strong>Cotas:</strong> ${c.quantidade} | <strong>Status:</strong> <span style="color:var(--secondary)">${c.statusPagamento.toUpperCase()}</span></p>
                            <p style="margin-top: 10px;"><strong>Seus Números:</strong></p>
                            <div class="meus-numeros-box" style="margin-top: 5px;">
                                ${tagsHTML}
                            </div>
                        </div>
                    `;
                });
                document.getElementById('resultado-busca').innerHTML = html;
            } catch (error) {
                alert('Erro ao buscar.');
            }
        }
    </script>
</body>
</html>
