<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Bilhete de Ouro</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Acesso <span style="color: var(--primary-color)">Administrativo</span></h1>
        <nav><a href="/" class="btn" style="background: #1e293b; color:#fff;">Voltar ao site</a></nav>
    </header>

    <main class="container" style="max-width: 420px; margin-top: 2rem;">
        <div class="card" style="text-align: left;">
            <h2 class="title" style="text-align: left; margin-bottom: 1rem;">Login do Administrador</h2>

            <div id="alert-box"></div>

            <form id="form-login">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input id="username" class="form-control" type="text" placeholder="admin" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input id="password" class="form-control" type="password" placeholder="••••••••" required>
                </div>

                <button id="btn-login" class="btn" type="submit" style="width: 100%;">Entrar no Painel</button>
            </form>
        </div>
    </main>

    <script src="/js/main.js"></script>
    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.innerText = 'Entrando...';

            try {
                await fetchAPI('/admin-api/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                window.location.href = '/admin/painel.html';
            } catch (error) {
                showAlert('alert-box', error.message || 'Falha ao autenticar.');
                btn.disabled = false;
                btn.innerText = 'Entrar no Painel';
            }
        });
    </script>
</body>
</html>
