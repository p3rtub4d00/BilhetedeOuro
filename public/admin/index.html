<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Bilhete de Ouro</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
    <div class="container login-box">
        <div class="card">
            <h2 class="title">Acesso Restrito</h2>
            <div id="alert-box"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="user" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="pass" class="form-control" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await fetchAPI('/admin-api/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('user').value,
                        password: document.getElementById('pass').value
                    })
                });
                window.location.href = '/admin/painel.html';
            } catch (err) {
                showAlert('alert-box', 'Usuário ou senha inválidos');
            }
        });
    </script>
</body>
</html>
