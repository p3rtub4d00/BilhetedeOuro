<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card">
            <h2 class="title">Admin Login</h2>
            <div id="alert-box"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Usuário (admin)</label>
                    <input type="text" id="user" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Senha (admin123)</label>
                    <input type="password" id="pass" class="form-control" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await fetchAPI('/admin-api/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('user').value,
                        password: document.getElementById('pass').value
                    })
                });
                window.location.href = '/admin/painel.html';
            } catch (err) {
                showAlert('alert-box', 'Credenciais inválidas');
            }
        });
    </script>
</body>
</html>
