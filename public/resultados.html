<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resultados Oficiais</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="hero-header" style="padding-bottom: 50px;">
        <div class="top-bar">
            <a href="/" class="logo-area"><i class="fa-solid fa-ticket-simple"></i> BILHETE<span class="highlight">OURO</span></a>
            <a href="/" class="btn-nav-outline"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </div>
        <h1 class="main-title" style="color: var(--accent-gold); font-size: 1.8rem;"><i class="fa-solid fa-trophy"></i> GANHADORES</h1>
    </header>

    <main class="container">
        <div class="grid-rifas" id="resultados-list"></div>
    </main>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const list = document.getElementById('resultados-list');
            try {
                const rifas = await fetchAPI('/api/resultados');
                
                if(rifas.length === 0) return list.innerHTML = '<div class="card" style="grid-column: 1/-1;"><p>Nenhum sorteio finalizado.</p></div>';

                rifas.forEach(rifa => {
                    const isAcumulado = rifa.vencedorInfo.includes('ACUMULOU');
                    const statusColor = isAcumulado ? '#dc2626' : '#00C853';

                    list.innerHTML += `
                        <div class="card" style="border-top: 5px solid ${statusColor}; text-align: left;">
                            <h3 class="card-title">${rifa.titulo}</h3>
                            <p class="card-desc" style="border-bottom: 2px solid #f0f2f5; padding-bottom: 10px;">${rifa.premio}</p>
                            
                            <p style="font-size: 0.8rem; font-weight: 700; color: var(--text-light); text-transform: uppercase;">Loteria Federal</p>
                            <p style="font-size: 0.85rem; margin-bottom: 15px; font-family: 'Roboto';">${rifa.resultadoLoteria}</p>
                            
                            <div style="background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; margin-bottom: 15px;">
                                <span style="font-size: 0.8rem; font-weight: 700;">NÚMERO SORTEADO</span>
                                <span style="font-size: 2.2rem; color: var(--text-dark); display:block; font-weight: 900; letter-spacing: 5px;">${rifa.numeroSorteado}</span>
                            </div>

                            <div style="background: ${isAcumulado ? '#fef2f2' : '#f0fdf4'}; padding: 15px; border-radius: 12px; border: 1px dashed ${statusColor};">
                                <span style="font-size: 0.8rem; font-weight: 700; color: ${statusColor}; display:block;">GANHADOR:</span>
                                <strong style="color: var(--text-dark); font-size: 1rem;">${rifa.vencedorInfo}</strong>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                list.innerHTML = '<div class="card"><p>Erro ao carregar resultados.</p></div>';
            }
        });
    </script>
</body>
</html>
