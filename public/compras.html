<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minhas Cotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="hero-header" style="padding-bottom: 50px;">
        <div class="top-bar">
            <a href="/" class="logo-area"><i class="fa-solid fa-ticket-simple"></i> BILHETE<span class="highlight">OURO</span></a>
            <a href="/" class="btn-nav-outline"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </div>
        <h1 class="main-title" style="color: white; font-size: 1.8rem;">MEUS BILHETES</h1>
    </header>

    <main class="container">
        <div class="card" style="max-width: 550px; margin: 0 auto 20px; text-align: left;">
            <h3 style="margin-bottom: 10px;">Consulta Segura</h3>
            <div id="alert-box"></div>

            <div class="form-group">
                <label>WhatsApp da compra</label>
                <input type="text" id="tel-busca" class="form-control" placeholder="(11) 99999-9999">
            </div>
            <button onclick="solicitarCodigo()" class="btn-primary"><i class="fa-solid fa-shield"></i> ENVIAR CÓDIGO</button>

            <div style="margin-top: 15px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
                <div class="form-group">
                    <label>Código de verificação</label>
                    <input type="text" id="codigo-otp" class="form-control" placeholder="Digite o código recebido">
                </div>
                <button onclick="validarCodigoEBuscar()" class="btn-primary" style="background: #1e293b; color: #fff;"><i class="fa-solid fa-key"></i> VALIDAR E BUSCAR</button>
            </div>
        </div>

        <div class="card" style="max-width: 550px; margin: 0 auto 30px; text-align: left;">
            <h3 style="margin-bottom: 10px;">Verificar Comprovante</h3>
            <div class="form-group">
                <label>Número do comprovante</label>
                <input type="text" id="numero-comprovante" class="form-control" placeholder="Ex: CMP-20260304-12345">
            </div>
            <button onclick="verificarComprovante()" class="btn-primary" style="background: #0f766e; color: #fff;"><i class="fa-solid fa-certificate"></i> VERIFICAR</button>
            <div id="resultado-comprovante" style="margin-top: 12px;"></div>
        </div>

        <div id="resultado-busca" style="display: flex; flex-direction: column; gap: 20px; max-width: 700px; margin: 0 auto;"></div>
    </main>

    <script src="/js/main.js"></script>
    <script>
        let tokenConsulta = '';

        async function solicitarCodigo() {
            const tel = document.getElementById('tel-busca').value;
            if(!tel) return showAlert('alert-box', 'Informe o telefone.');

            try {
                const data = await fetchAPI('/api/minhas-compras/solicitar-codigo', {
                    method: 'POST',
                    body: JSON.stringify({ telefone: tel })
                });

                // Ambiente de teste: mostra código retornado
                showAlert('alert-box', `Código enviado! (teste: ${data.codigoDebug})`, 'success');
            } catch (error) {
                showAlert('alert-box', error.message);
            }
        }

        async function validarCodigoEBuscar() {
            const tel = document.getElementById('tel-busca').value;
            const codigo = document.getElementById('codigo-otp').value.trim();
            const resultBox = document.getElementById('resultado-busca');

            if(!tel || !codigo) return showAlert('alert-box', 'Informe telefone e código.');

            try {
                const auth = await fetchAPI('/api/minhas-compras/verificar-codigo', {
                    method: 'POST',
                    body: JSON.stringify({ telefone: tel, codigo })
                });

                tokenConsulta = auth.token;

                const compras = await fetchAPI('/api/minhas-compras', {
                    headers: { Authorization: `Bearer ${tokenConsulta}` }
                });

                let html = '';
                if(!compras || compras.length === 0) {
                    html = '<div class="card"><p style="color: var(--text-light);">Nenhuma cota encontrada.</p></div>';
                } else {
                    compras.forEach(c => {
                        const tagsHTML = c.numeros.map(n => `<span class="num-tag">${n}</span>`).join('');
                        html += `
                            <div class="card" style="text-align: left;">
                                <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 15px;">
                                    <h3 class="card-title" style="margin: 0; font-size: 1rem;">${c.rifaId.titulo}</h3>
                                    <span style="background: #00C853; color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 900;">PAGO</span>
                                </div>
                                <p style="font-family: 'Roboto'; font-size: 0.9rem;"><strong>Qtd. Cotas:</strong> ${c.quantidade}</p>
                                <p style="font-family: 'Roboto'; font-size: 0.85rem;"><strong>Comprovante:</strong> ${c.numeroComprovante || '-'}</p>
                                <div class="meus-numeros-box" style="margin-top: 15px;">${tagsHTML}</div>
                            </div>
                        `;
                    });
                }
                resultBox.innerHTML = html;
            } catch (error) {
                showAlert('alert-box', error.message);
                resultBox.innerHTML = '';
            }
        }

        async function verificarComprovante() {
            const numero = document.getElementById('numero-comprovante').value.trim();
            const box = document.getElementById('resultado-comprovante');
            if(!numero) return;

            try {
                const c = await fetchAPI(`/api/comprovantes/${numero}`);
                box.innerHTML = `
                    <div class="alert" style="background:#ecfeff; border:1px dashed #0891b2; text-align:left;">
                        <p><strong>Status:</strong> ${c.statusPagamento.toUpperCase()}</p>
                        <p><strong>Rifa:</strong> ${c.rifa ? c.rifa.titulo : 'N/A'}</p>
                        <p><strong>Comprador:</strong> ${c.comprador.nome} (${c.comprador.telefoneMascarado})</p>
                        <p style="word-break: break-all;"><strong>Hash:</strong> ${c.hashComprovante}</p>
                    </div>
                `;
            } catch (err) {
                box.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
